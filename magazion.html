      @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Cairo:wght@400;600;700&display=swap");

      :root {
        --bg: #15181c;
        --panel: #1f242b;
        --panel2: #262c34;
        --line: #343c46;
        --text: #eef1f3;
        --muted: #8b96a3;
        --yellow: #f2b705;
        --orange: #e85d04;
        --green: #2d9d6f;
        --red: #d6473a;
        --blue: #3d8bdb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Cairo", "Oswald", sans-serif;
      }
      [dir="ltr"] body,
      body.ltr {
        font-family: "Oswald", "Cairo", sans-serif;
      }
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }
      #app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .hazard {
        height: 6px;
        background: repeating-linear-gradient(
          45deg,
          var(--yellow) 0 14px,
          #000 14px 28px
        );
      }
      header {
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.5px;
      }
      .logo .dot {
        width: 12px;
        height: 12px;
        background: var(--yellow);
        border-radius: 2px;
        transform: rotate(45deg);
      }
      header .spacer {
        flex: 1;
      }
      select,
      button,
      input,
      textarea {
        font-family: inherit;
        font-size: 14px;
      }
      select {
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
        padding: 7px 10px;
        border-radius: 6px;
      }
      button {
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: var(--panel2);
        color: var(--text);
        padding: 8px 14px;
        font-weight: 600;
        transition: 0.15s;
      }
      button:hover {
        border-color: var(--yellow);
      }
      button.primary {
        background: var(--yellow);
        color: #15181c;
        border-color: var(--yellow);
      }
      button.primary:hover {
        background: #ffd23f;
      }
      button.danger {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }
      button.ghost {
        background: transparent;
        border-color: transparent;
      }
      nav {
        display: flex;
        gap: 6px;
        padding: 10px 20px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        overflow-x: auto;
      }
      nav button {
        white-space: nowrap;
        background: transparent;
        border: none;
        color: var(--muted);
        padding: 8px 14px;
        border-bottom: 3px solid transparent;
        border-radius: 0;
      }
      nav button.active {
        color: var(--yellow);
        border-bottom-color: var(--yellow);
      }
      main {
        flex: 1;
        padding: 22px;
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 16px;
      }
      .card h3 {
        margin: 0 0 14px;
        font-size: 16px;
        color: var(--yellow);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .grid.cols-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid.cols-3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .grid.cols-4 {
        grid-template-columns: repeat(4, 1fr);
      }
      @media (max-width: 900px) {
        .grid.cols-2,
        .grid.cols-3,
        .grid.cols-4 {
          grid-template-columns: 1fr;
        }
      }
      label {
        font-size: 12px;
        color: var(--muted);
        display: block;
        margin-bottom: 4px;
      }
      input,
      textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 9px 10px;
        border-radius: 6px;
      }
      textarea {
        resize: vertical;
      }
      .field {
        margin-bottom: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th,
      td {
        padding: 9px 8px;
        border-bottom: 1px solid var(--line);
        text-align: start;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .badge {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
      }
      .badge.ok {
        background: rgba(45, 157, 111, 0.18);
        color: var(--green);
      }
      .badge.warn {
        background: rgba(232, 93, 4, 0.18);
        color: var(--orange);
      }
      .badge.bad {
        background: rgba(214, 71, 58, 0.18);
        color: var(--red);
      }
      .badge.blue {
        background: rgba(61, 139, 219, 0.18);
        color: var(--blue);
      }
      .stat {
        background: var(--panel2);
        border-radius: 8px;
        padding: 14px;
        text-align: center;
      }
      .stat .num {
        font-family: "IBM Plex Mono", monospace;
        font-size: 26px;
        font-weight: 700;
      }
      .stat .lbl {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }
      .prodimg {
        width: 54px;
        height: 54px;
        border-radius: 8px;
        object-fit: cover;
        background: var(--panel2);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .row.wrap {
        flex-wrap: wrap;
      }
      .tag {
        font-size: 11px;
        background: var(--panel2);
        padding: 2px 8px;
        border-radius: 5px;
        color: var(--muted);
      }
      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }
      .modal {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 22px;
        max-width: 700px;
        width: 100%;
        max-height: 92vh;
        overflow: auto;
      }
      .bar-bg {
        height: 8px;
        background: var(--panel2);
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 4px;
      }
      .login-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
      }
      .login-box {
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 30px;
        border-radius: 12px;
        width: 340px;
        text-align: center;
      }
      .smallmuted {
        color: var(--muted);
        font-size: 12px;
      }
      .flex-between {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .done-strip {
        background: rgba(45, 157, 111, 0.07);
        border-inline-start: 3px solid var(--green);
      }
      .pending-strip {
        border-inline-start: 3px solid var(--yellow);
      }
      hr.sep {
        border: none;
        border-top: 1px solid var(--line);
        margin: 14px 0;
      }
      .empty {
        text-align: center;
        padding: 40px 0;
        color: var(--muted);
      }
      .toast {
        position: fixed;
        bottom: 20px;
        inset-inline-end: 20px;
        background: var(--green);
        color: #fff;
        padding: 12px 18px;
        border-radius: 8px;
        font-weight: 600;
        z-index: 100;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }
      .toast.err {
        background: var(--red);
      }

      /* ---- schedule table ---- */
      .sched-wrap {
        overflow-x: auto;
      }
      .sched-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        min-width: 800px;
      }
      .sched-table th {
        background: var(--panel2);
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        padding: 10px 8px;
        border-bottom: 2px solid var(--line);
        white-space: nowrap;
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .sched-table td {
        padding: 9px 8px;
        border-bottom: 1px solid var(--line);
        vertical-align: middle;
      }
      .sched-table tr.row-done {
        background: rgba(45, 157, 111, 0.07);
      }
      .sched-table tr.row-pending:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .confirm-cb {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: var(--green);
      }
      .prog-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 700;
        margin-inline-end: 6px;
      }
      .pb-daily {
        background: rgba(61, 139, 219, 0.2);
        color: var(--blue);
      }
      .pb-location {
        background: rgba(242, 183, 5, 0.2);
        color: var(--yellow);
      }
      .pb-brazer {
        background: rgba(232, 93, 4, 0.2);
        color: var(--orange);
      }
      .pb-amazon {
        background: rgba(45, 157, 111, 0.2);
        color: var(--green);
      }
      .pb-macro {
        background: rgba(139, 150, 163, 0.2);
        color: var(--muted);
      }
      .notes-card {
        background: rgba(242, 183, 5, 0.06);
        border: 1px solid rgba(242, 183, 5, 0.25);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .notes-card h3 {
        margin: 0 0 10px;
        color: var(--yellow);
      }
      .kilo-field {
        width: 80px;
        background: var(--bg);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 5px 6px;
        border-radius: 5px;
        text-align: center;
      }
      .row-notes-inp {
        width: 120px;
        background: var(--bg);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 5px 6px;
        border-radius: 5px;
      }
      .prog-section {
        margin-bottom: 20px;
      }
      .prog-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .prog-title {
        font-weight: 700;
        font-size: 15px;
      }
      .input-sm {
        background: var(--bg);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 5px 8px;
        border-radius: 5px;
        font-family: inherit;
        font-size: 13px;
      }

      const PROG_TYPES = ["daily", "location", "brazer", "amazon", "macro"];

      /* ====================== STATE ====================== */
      let state = {
        lang: "ar",
        role: null,
        products: [],
        programs: {},
        covers: [], // [{id, name, coverType:'front'|'back'}]
        baskets: [], // [{id, name}]
        managerNotes: {}, // date -> string
        settings: {
          wasteTicket: 4,
          wasteCap: 2,
          wasteJerrican: 1.8,
          lowStock: 5,
        },
        log: [],
        loaded: false,
        tab: "dashboard",
        progDate: null,
        progTypeFilter: "all",
      };
      const ADMIN_PASS = "admin123";
      const todayStr = () => new Date().toISOString().slice(0, 10);

      function t(k) {
        return (I18N[state.lang] && I18N[state.lang][k]) || k;
      }

      /* ---------- storage ---------- */
      async function load() {
        try {
          const r = await window.storage.get("products", true);
          state.products = r ? JSON.parse(r.value) : [];
        } catch (e) {
          state.products = [];
        }
        try {
          const r = await window.storage.get("programs", true);
          state.programs = r ? JSON.parse(r.value) : {};
        } catch (e) {
          state.programs = {};
        }
        try {
          const r = await window.storage.get("covers", true);
          state.covers = r ? JSON.parse(r.value) : [];
        } catch (e) {
          state.covers = [];
        }
        try {
          const r = await window.storage.get("baskets", true);
          state.baskets = r ? JSON.parse(r.value) : [];
        } catch (e) {
          state.baskets = [];
        }
        try {
          const r = await window.storage.get("managerNotes", true);
          state.managerNotes = r ? JSON.parse(r.value) : {};
        } catch (e) {
          state.managerNotes = {};
        }
        try {
          const r = await window.storage.get("settings", true);
          state.settings = r ? JSON.parse(r.value) : state.settings;
        } catch (e) {}
        try {
          const r = await window.storage.get("log", true);
          state.log = r ? JSON.parse(r.value) : [];
        } catch (e) {
          state.log = [];
        }
        state.loaded = true;
        render();
      }
      async function saveProducts() {
        await window.storage.set(
          "products",
          JSON.stringify(state.products),
          true,
        );
      }
      async function savePrograms() {
        await window.storage.set(
          "programs",
          JSON.stringify(state.programs),
          true,
        );
      }
      async function saveCovers() {
        await window.storage.set("covers", JSON.stringify(state.covers), true);
      }
      async function saveBaskets() {
        await window.storage.set(
          "baskets",
          JSON.stringify(state.baskets),
          true,
        );
      }
      async function saveManagerNotes() {
        await window.storage.set(
          "managerNotes",
          JSON.stringify(state.managerNotes),
          true,
        );
      }
      async function saveSettings() {
        await window.storage.set(
          "settings",
          JSON.stringify(state.settings),
          true,
        );
      }
      async function saveLog() {
        if (state.log.length > 800) state.log = state.log.slice(-800);
        await window.storage.set("log", JSON.stringify(state.log), true);
      }
      function addLog(entry) {
        state.log.push({ ...entry, time: new Date().toISOString() });
        saveLog();
      }

      /* ---------- toast ---------- */
      function toast(msg, err) {
        const d = document.createElement("div");
        d.className = "toast" + (err ? " err" : "");
        d.textContent = msg;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 2600);
      }

      /* ====================== helpers ====================== */
      function bancaleEquivalent(p, stock) {
        const f =
          p.ticketsFront > 0 ? stock.ticketsFront / p.ticketsFront : Infinity;
        const b =
          p.ticketsBack > 0 ? stock.ticketsBack / p.ticketsBack : Infinity;
        const c = p.capsPer > 0 ? stock.caps / p.capsPer : Infinity;
        const j =
          p.jerricansPer > 0 ? stock.jerricans / p.jerricansPer : Infinity;
        return Math.min(f, b, c, j);
      }
      function stockStatus(be, thr) {
        if (be < thr) return "bad";
        if (be < thr * 1.5) return "warn";
        return "ok";
      }
      function getProduct(id) {
        return state.products.find((p) => p.id === id);
      }
      function getCover(id) {
        return state.covers.find((c) => c.id === id);
      }
      function getBasket(id) {
        return state.baskets.find((b) => b.id === id);
      }
      function progTypeBadge(type) {
        const labels = {
          daily: t("prog_daily"),
          location: t("prog_location"),
          brazer: t("prog_brazer"),
          amazon: t("prog_amazon"),
          macro: t("prog_macro"),
        };
        return `<span class="prog-badge pb-${type || "daily"}">${labels[type] || labels.daily}</span>`;
      }

      /* ====================== RENDER ROOT ====================== */
      function render() {
        const root = document.getElementById("app");
        document.documentElement.dir = I18N[state.lang].dir;
        document.body.className = I18N[state.lang].dir === "ltr" ? "ltr" : "";
        if (!state.loaded) {
          root.innerHTML =
            '<div style="padding:40px;text-align:center;color:#8b96a3">Loading...</div>';
          return;
        }
        if (!state.role) {
          renderLogin(root);
          return;
        }
        renderApp(root);
      }

      /* ====================== LOGIN ====================== */
      function renderLogin(root) {
        root.innerHTML = `
  <div class="hazard"></div>
  <header>
    <div class="logo"><div class="dot"></div>${t("title")}</div>
    <div class="spacer"></div>
    ${langSelectHTML()}
  </header>
  <div class="login-wrap">
    <div class="login-box">
      <h2>${t("title")}</h2>
      <p class="smallmuted">${t("users_note")}</p>
      <hr class="sep">
      <button style="width:100%;margin-bottom:10px" id="btnWorker">${t("role_worker")}</button>
      <div class="field" style="margin-top:14px">
        <label>${t("password")} (${t("role_admin")})</label>
        <input type="password" id="adminPass" placeholder="••••••">
      </div>
      <button class="primary" style="width:100%" id="btnAdmin">${t("role_admin")} ${t("login")}</button>
      <div id="loginErr" style="color:#d6473a;font-size:13px;margin-top:8px"></div>
    </div>
  </div>`;
        bindLangSelect();
        document.getElementById("btnWorker").onclick = () => {
          state.role = "worker";
          state.tab = "dashboard";
          render();
        };
        document.getElementById("btnAdmin").onclick = () => {
          const v = document.getElementById("adminPass").value;
          if (v === ADMIN_PASS) {
            state.role = "admin";
            state.tab = "dashboard";
            render();
          } else
            document.getElementById("loginErr").textContent = t("wrong_pass");
        };
      }
      function langSelectHTML() {
        return `<select id="langSel">
    <option value="ar" ${state.lang === "ar" ? "selected" : ""}>العربية</option>
    <option value="it" ${state.lang === "it" ? "selected" : ""}>Italiano</option>
    <option value="en" ${state.lang === "en" ? "selected" : ""}>English</option>
    <option value="es" ${state.lang === "es" ? "selected" : ""}>Español</option>
  </select>`;
      }
      function bindLangSelect() {
        document.getElementById("langSel").onchange = (e) => {
          state.lang = e.target.value;
          render();
        };
      }

      /* ====================== APP SHELL ====================== */
      function renderApp(root) {
        if (!state.tab) state.tab = "dashboard";
        const tabs =
          state.role === "admin"
            ? [
                "dashboard",
                "products",
                "inventory",
                "program",
                "history",
                "stats",
                "admin",
              ]
            : ["dashboard", "program", "history"];
        root.innerHTML = `
  <div class="hazard"></div>
  <header>
    <div class="logo"><div class="dot"></div>${t("title")}</div>
    <div class="spacer"></div>
    <span class="tag">${state.role === "admin" ? t("role_admin") : t("role_worker")}</span>
    ${langSelectHTML()}
    <button id="btnLogout">${t("logout")}</button>
  </header>
  <nav>${tabs.map((tb) => `<button data-tab="${tb}" class="${state.tab === tb ? "active" : ""}">${t(tb)}</button>`).join("")}</nav>
  <main id="main"></main>`;
        bindLangSelect();
        document.getElementById("btnLogout").onclick = () => {
          state.role = null;
          render();
        };
        root.querySelectorAll("nav button").forEach(
          (b) =>
            (b.onclick = () => {
              state.tab = b.dataset.tab;
              render();
            }),
        );
        const main = document.getElementById("main");
        if (state.tab === "dashboard") renderDashboard(main);
        else if (state.tab === "products") renderProducts(main);
        else if (state.tab === "inventory") renderInventory(main);
        else if (state.tab === "program") renderProgram(main);
        else if (state.tab === "history") renderHistory(main);
        else if (state.tab === "stats") renderStats(main);
        else if (state.tab === "admin") renderAdmin(main);
      }

      /* ====================== DASHBOARD ====================== */
      function renderDashboard(main) {
        const low = state.products.filter(
          (p) => bancaleEquivalent(p, p.stock) < state.settings.lowStock,
        );
        const today = todayStr();
        const progs = state.programs[today] || [];
        let totalTarget = 0,
          totalDone = 0;
        progs.forEach((pr) =>
          pr.items.forEach((it) => {
            totalTarget += Number(it.target) || 0;
            if (it.status === "done") totalDone += Number(it.target) || 0;
          }),
        );
        const note = state.managerNotes[today] || "";

        main.innerHTML = `
  ${
    note
      ? `<div class="notes-card">
    <h3>📋 ${t("manager_notes")} — ${today}</h3>
    <p style="white-space:pre-wrap;margin:0;line-height:1.6">${note}</p>
  </div>`
      : state.role === "admin"
        ? `<div class="notes-card" style="opacity:.6"><h3>📋 ${t("manager_notes")}</h3><p class="smallmuted">${t("write_notes")}</p></div>`
        : ""
  }

  <div class="grid cols-4" style="margin-bottom:16px">
    <div class="stat"><div class="num">${state.products.length}</div><div class="lbl">${t("products")}</div></div>
    <div class="stat"><div class="num">${progs.length}</div><div class="lbl">${t("today_program")}</div></div>
    <div class="stat"><div class="num">${totalDone}<span style="font-size:16px;color:var(--muted)">/${totalTarget}</span></div><div class="lbl">${t("total_done")} / ${t("total_target")}</div></div>
    <div class="stat"><div class="num" style="color:${low.length ? "#d6473a" : "#2d9d6f"}">${low.length}</div><div class="lbl">${t("low_stock_warning")}</div></div>
  </div>

  ${
    low.length
      ? `<div class="card" style="border-color:#d6473a;margin-bottom:16px">
    <h3 style="color:#d6473a">⚠ ${t("low_stock_warning")}</h3>
    <table><thead><tr><th>${t("products")}</th><th>${t("company")}</th><th>${t("bancale_equiv")}</th></tr></thead><tbody>
    ${low.map((p) => `<tr><td>${p.name || p.code}</td><td>${p.company}</td><td class="mono">${bancaleEquivalent(p, p.stock).toFixed(1)}</td></tr>`).join("")}
    </tbody></table></div>`
      : ""
  }

  <div class="card">
    <div class="flex-between" style="margin-bottom:12px">
      <h3 style="margin:0">${t("today_program")} — ${today}</h3>
      <button id="goProgBtn" style="font-size:12px">${t("program")} ←</button>
    </div>
    ${
      progs.length === 0
        ? `<div class="empty">${t("no_program_today")}</div>`
        : progs
            .map(
              (pr) => `
      <div class="prog-section">
        <div class="prog-header">${progTypeBadge(pr.progType)}<span class="prog-title">${pr.label || ""}</span></div>
        <div class="sched-wrap"><table class="sched-table">
          <thead><tr>
            <th>${t("col_time")}</th><th>${t("col_product")}</th><th>${t("col_cover")}</th><th>${t("col_basket")}</th>

      /* ====================== PRODUCTS ====================== */
      function renderProducts(main) {
        main.innerHTML = `
  <div class="flex-between" style="margin-bottom:14px">

  <div id="prodList" class="grid cols-3"></div>`;

          const list = state.products.filter(

              !filter ||
              (p.name + p.company + p.code)
                .toLowerCase()
                .includes(filter.toLowerCase()),
          );
          const wrap = document.getElementById("prodList");
          wrap.innerHTML = list.length
            ? list
                .map((p) => {
                  const be = bancaleEquivalent(p, p.stock);
                  const st = stockStatus(be, state.settings.lowStock);
                  return `<div class="card">
      <div class="row">
        ${p.image ? `<img src="${p.image}" class="prodimg">` : `<div class="prodimg row" style="align-items:center;justify-content:center;color:#8b96a3;font-size:11px">${t("no_image")}</div>`}
        <div><div style="font-weight:700">${p.name}</div><div class="smallmuted">${p.company} · ${p.type} · ${p.liter}L</div></div>

      <hr class="sep">
      <div class="smallmuted mono">${t("code")}: ${p.code} | ${t("barcode")}: ${p.barcode || "-"}</div>

        <button class="danger" data-del="${p.id}">${t("delete")}</button>
      </div>`
          : ""
      }
      </div>`;

            : `<div class="empty">${t("no_products")}</div>`;
          wrap
            .querySelectorAll("[data-edit]")

              (b) =>
                (b.onclick = () =>
                  openProductModal(getProduct(b.dataset.edit))),
            );
          wrap.querySelectorAll("[data-del]").forEach(
            (b) =>
              (b.onclick = () => {
                if (confirm(t("confirm_delete"))) {
                  state.products = state.products.filter(
                    (p) => p.id !== b.dataset.del,
                  );
                  saveProducts();
                  addLog({ type: "delete_product", detail: b.dataset.del });
                  render();
                }
              }),
          );
        }
        draw("");
        document.getElementById("searchP").oninput = (e) =>
          draw(e.target.value);

          document.getElementById("addProdBtn").onclick = () =>

            id,
            company,
            type: document.getElementById("f_type").value.trim(),
            liter: Number(document.getElementById("f_liter").value) || 0,
            code,
            barcode: document.getElementById("f_barcode").value.trim(),
            capSize: document.getElementById("f_capsize").value.trim(),
            image: document.getElementById("f_image").value.trim(),
            ticketsFront: Number(document.getElementById("f_tf").value) || 0,
            ticketsBack: Number(document.getElementById("f_tb").value) || 0,
            capsPer: Number(document.getElementById("f_caps").value) || 0,
            jerricansPer: Number(document.getElementById("f_jer").value) || 0,
            name:
              company + " - " + document.getElementById("f_type").value.trim(),
            stock: existing
              ? existing.stock
              : { ticketsFront: 0, ticketsBack: 0, caps: 0, jerricans: 0 },
          };
          if (existing) {
            const idx = state.products.findIndex((p) => p.id === id);
            state.products[idx] = prod;
          } else state.products.push(prod);
          saveProducts();
          addLog({ type: "product_saved", product: prod.code });
          toast(t("success_added"));
          m.remove();
          render();
        };
      }

      /* ====================== INVENTORY ====================== */

          wrap.innerHTML = `<div class="empty">${t("no_products")}</div>`;

            );

      <div class="field"><label>${t("tickets_front")}</label><input id="s_tf" type="number" value="0"></div>

          saveProducts();
          addLog({
            type: "restock",

      /* ====================== PROGRAM (Daily Schedule) ====================== */
      function renderProgram(main) {
        if (!state.progDate) state.progDate = todayStr();
        const date = state.progDate;
        const allProgs = state.programs[date] || [];
        const filter = state.progTypeFilter || "all";
        const progs =
          filter === "all"
            ? allProgs
            : allProgs.filter((p) => p.progType === filter);

        main.innerHTML = `
  <!-- controls -->
  <div class="card" style="padding:12px 18px;margin-bottom:14px">
    <div class="row wrap">
      <div><label style="font-size:11px;margin-bottom:2px">${t("date")}</label>
        <input type="date" id="dateSel" value="${date}" style="width:auto;padding:7px 10px"></div>
      <div><label style="font-size:11px;margin-bottom:2px">${t("prog_type")}</label>
        <select id="typeFilter" style="width:auto">
          <option value="all" ${filter === "all" ? "selected" : ""}>${t("all_types")}</option>
          ${PROG_TYPES.map((tp) => `<option value="${tp}" ${filter === tp ? "selected" : ""}>${t("prog_" + tp)}</option>`).join("")}
        </select></div>
      <div class="spacer" style="flex:1"></div>
      ${state.role === "admin" ? `<button class="primary" id="addProgBtn">+ ${t("add_program")}</button>` : ""}
    </div>
  </div>

  <!-- manager notes (admin writes) -->
  ${
    state.role === "admin"
      ? `<div class="notes-card" style="margin-bottom:16px">
    <h3>📋 ${t("manager_notes")} — ${date}</h3>
    <textarea id="notesTa" class="notes-ta" placeholder="${t("write_notes")}">${state.managerNotes[date] || ""}</textarea>
    <div style="margin-top:8px"><button class="primary" id="saveNotesBtn">${t("save_notes")}</button></div>
  </div>`
      : ""
  }
  ${
    state.role === "worker" && (state.managerNotes[date] || "")
      ? `<div class="notes-card" style="margin-bottom:16px">
    <h3>📋 ${t("manager_notes")}</h3>
    <p style="white-space:pre-wrap;margin:0;line-height:1.7">${state.managerNotes[date]}</p>
  </div>`
      : ""
  }

  <!-- programs -->
  <div id="progArea"></div>`;

        document.getElementById("dateSel").onchange = (e) => {
          state.progDate = e.target.value;
          renderProgram(main);
        };
        document.getElementById("typeFilter").onchange = (e) => {
          state.progTypeFilter = e.target.value;
          renderProgram(main);
        };
        if (state.role === "admin") {
          document.getElementById("addProgBtn").onclick = () =>
            openAddProgramModal(date, () => renderProgram(main));
          document.getElementById("saveNotesBtn").onclick = () => {
            state.managerNotes[date] = document.getElementById("notesTa").value;
            saveManagerNotes();
            toast(t("success_added"));
          };
        }

        const area = document.getElementById("progArea");
        if (progs.length === 0) {
          area.innerHTML = `<div class="empty">${t("no_program_today")}</div>`;
          return;
        }

        area.innerHTML = progs
          .map((pr, pi) => {
            const realPi = allProgs.indexOf(pr);
            const allDone = pr.items.every((i) => i.status === "done");
            return `<div class="card prog-section" data-prog="${realPi}">
      <div class="prog-header flex-between">
        <div class="row">
          ${progTypeBadge(pr.progType)}
          <span class="prog-title">${pr.label || t("today_program")}</span>
          ${allDone ? `<span class="badge ok">✓ ${t("done")}</span>` : ""}
        </div>
        <div class="row">
          ${!allDone && state.role === "admin" ? `<button class="ghost" style="font-size:12px" data-carry="${realPi}">${t("carry_over")} →</button>` : ""}
          ${state.role === "admin" ? `<button class="danger ghost" style="font-size:12px;padding:4px 8px" data-delprog="${realPi}">✕</button>` : ""}
        </div>
      </div>
      <div class="sched-wrap">
      <table class="sched-table">
        <thead><tr>
          <th>#</th>
          <th>${t("col_time")}</th>
          <th>${t("col_product")}</th>
          <th>${t("col_cover")}</th>
          <th>${t("col_basket")}</th>
          <th>${t("col_target")}</th>
          <th>${t("col_kilos")}</th>
          <th>${t("col_notes")}</th>
          <th>${t("col_confirm")}</th>
        </tr></thead>
        <tbody>
        ${pr.items
          .map((it, ii) => {
            const p = getProduct(it.productId);
            const cv = getCover(it.coverId);
            const bk = getBasket(it.basketId);
            return `<tr class="${it.status === "done" ? "row-done" : "row-pending"}">
            <td class="mono smallmuted">${ii + 1}</td>
            <td class="mono">${it.time || "—"}</td>
            <td><strong>${p ? p.name : `<span style="color:var(--red)">?</span>`}</strong>${p ? `<br><span class="smallmuted">${p.code}</span>` : ""}</td>
            <td class="smallmuted">${cv ? cv.name + '<br><span style="font-size:10px">' + t("cover_type") + ": " + t(cv.coverType === "front" ? "front_cover" : "back_cover") + "</span>" : "—"}</td>
            <td class="smallmuted">${bk ? bk.name : "—"}</td>
            <td class="mono" style="font-weight:700">${it.target || "—"}</td>
            <td>
              ${
                state.role === "admin"
                  ? `<input class="kilo-field" type="number" value="${it.kilos || ""}" placeholder="كجم" data-kilo="${realPi}:${ii}">`
                  : `<span class="mono">${it.kilos || "—"}</span>`
              }
            </td>
            <td>
              ${
                state.role === "admin"
                  ? `<input class="row-notes-inp" type="text" value="${it.notes || ""}" placeholder="..." data-rnote="${realPi}:${ii}">`
                  : `<span class="smallmuted">${it.notes || ""}</span>`
              }
            </td>
            <td style="text-align:center">
              ${
                it.status === "done"
                  ? state.role === "admin"
                    ? `<button class="ghost" style="font-size:18px;padding:4px" data-undo="${realPi}:${ii}" title="${t("undo")}">↩</button><span class="badge ok" style="margin-inline-start:4px">✓</span>`
                    : `<span class="badge ok">✓ ${t("done")}</span>`
                  : `<input type="checkbox" class="confirm-cb" data-done="${realPi}:${ii}" title="${t("confirm")}">`
              }
            </td>
          </tr>`;
          })
          .join("")}
        </tbody>
      </table>
      </div>
    </div>`;
          })
          .join("");

        /* bind kilos & notes (admin live-save) */
        area.querySelectorAll("[data-kilo]").forEach(
          (inp) =>
            (inp.onchange = (e) => {
              const [pi, ii] = e.target.dataset.kilo.split(":").map(Number);
              allProgs[pi].items[ii].kilos = Number(e.target.value) || 0;
              savePrograms();
            }),
        );
        area.querySelectorAll("[data-rnote]").forEach(
          (inp) =>
            (inp.onchange = (e) => {
              const [pi, ii] = e.target.dataset.rnote.split(":").map(Number);
              allProgs[pi].items[ii].notes = e.target.value;
              savePrograms();
            }),
        );

        /* checkbox confirm */
        area.querySelectorAll("[data-done]").forEach(
          (cb) =>
            (cb.onchange = (e) => {
              if (!e.target.checked) return;
              e.target.checked = false;
              const [pi, ii] = e.target.dataset.done.split(":").map(Number);
              openConfirmCodeModal(
                allProgs[pi].items[ii],
                "done",
                date,
                pi,
                ii,
                () => renderProgram(main),
              );
            }),
        );

        /* undo */
        area.querySelectorAll("[data-undo]").forEach(
          (b) =>
            (b.onclick = () => {
              const [pi, ii] = b.dataset.undo.split(":").map(Number);
              openConfirmCodeModal(
                allProgs[pi].items[ii],
                "undo",
                date,
                pi,
                ii,
                () => renderProgram(main),
              );
            }),
        );

        /* delete program */
        area.querySelectorAll("[data-delprog]").forEach(
          (b) =>
            (b.onclick = () => {
              if (!confirm(t("confirm_delete"))) return;
              const pi = Number(b.dataset.delprog);
              allProgs.splice(pi, 1);
              state.programs[date] = allProgs;
              savePrograms();
              addLog({ type: "delete_program", date, by: state.role });
              renderProgram(main);
            }),
        );

        /* carry over */
        area.querySelectorAll("[data-carry]").forEach(
          (b) =>
            (b.onclick = () => {
              const pi = Number(b.dataset.carry);
              const pr = allProgs[pi];
              const pending = pr.items.filter((i) => i.status !== "done");
              if (pending.length === 0) return;
              const next = new Date(date);
              next.setDate(next.getDate() + 1);
              const nextStr = next.toISOString().slice(0, 10);
              if (!state.programs[nextStr]) state.programs[nextStr] = [];
              state.programs[nextStr].push({
                id: "pr" + Date.now(),
                label: pr.label,
                progType: pr.progType,
                items: pending.map((i) => ({
                  productId: i.productId,
                  target: i.target,
                  kilos: 0,
                  time: i.time,
                  coverId: i.coverId,
                  basketId: i.basketId,
                  notes: "",
                  status: "pending",
                })),
              });
              savePrograms();
              addLog({
                type: "carry_over",
                from: date,
                to: nextStr,
                count: pending.length,
                by: state.role,
              });
              toast(t("success_added"));
              renderProgram(main);
            }),
        );
      }

    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="color:var(--muted);font-size:11px">
        <th style="padding:6px 4px">${t("col_product")}</th>
        <th style="padding:6px 4px">${t("col_cover")}</th>
        <th style="padding:6px 4px">${t("col_basket")}</th>
        <th style="padding:6px 4px">${t("col_time")}</th>
        <th style="padding:6px 4px">${t("col_target")}</th>
        <th style="padding:6px 4px">${t("col_kilos")}</th>
        <th style="padding:6px 4px">${t("col_notes")}</th>
        <th></th>
      </tr></thead>
      <tbody id="progRows">${makeRow(rowCount++)}</tbody>
    </table>
    </div>
    <button id="addRow" style="margin-top:8px">+ ${t("select_product")}</button>
    <div class="row" style="justify-content:flex-end;margin-top:16px">
      <button id="cnl">${t("cancel")}</button>
      <button class="primary" id="cfm">${t("save")}</button>
    </div>
  </div>`;
        document.body.appendChild(m);
        const tbody = document.getElementById("progRows");
        tbody.addEventListener("click", (e) => {
          if (e.target.classList.contains("rDel")) {
            const tr = e.target.closest("tr");
            if (tbody.querySelectorAll("tr").length > 1) tr.remove();
          }
        });
        document.getElementById("addRow").onclick = () => {
          tbody.insertAdjacentHTML("beforeend", makeRow(rowCount++));
        };
        document.getElementById("cnl").onclick = () => m.remove();
        document.getElementById("cfm").onclick = () => {
          const items = [];
          tbody.querySelectorAll("[data-row]").forEach((r) => {
            const pid = r.querySelector(".rProd").value;
            const target = Number(r.querySelector(".rTarget").value);
            if (!pid || !target) return;
            items.push({
              productId: pid,
              coverId: r.querySelector(".rCover").value || null,
              basketId: r.querySelector(".rBasket").value || null,
              time: r.querySelector(".rTime").value || "",
              target,
              kilos: Number(r.querySelector(".rKilos").value) || 0,
              notes: r.querySelector(".rNotes").value || "",
              status: "pending",
            });
          });
          if (items.length === 0) {
            toast("—", true);
            return;
          }
          if (!state.programs[date]) state.programs[date] = [];
          state.programs[date].push({
            id: "pr" + Date.now(),
            label:
              document.getElementById("progLabel").value ||
              t("prog_" + document.getElementById("progTypeS").value),
            progType: document.getElementById("progTypeS").value,
            items,
          });
          savePrograms();
          addLog({
            type: "program_added",
            date,
            count: items.length,
            by: state.role,
          });
          toast(t("success_added"));
          m.remove();
          cb();
        };
      }

      /* ---- Confirm Code Modal ---- */
      function openConfirmCodeModal(item, action, date, pi, ii, cb) {
        const p = getProduct(item.productId);
        if (!p) {
          toast("?", true);
          return;
        }
        const m = document.createElement("div");
        m.className = "modal-bg";
        m.innerHTML = `<div class="modal" style="max-width:360px;text-align:center">
    <h3>${action === "done" ? t("enter_code") : t("undo_confirm")}</h3>
    <p style="font-weight:700">${p.name}</p>
    <p class="smallmuted">${t("target_bancale")}: <span class="mono">${item.target}</span></p>
    <input id="codeInput" placeholder="${t("code")}" style="text-align:center;font-size:16px;font-weight:700">
    <div class="row" style="justify-content:center;margin-top:16px;gap:12px">
      <button id="cnl">${t("cancel")}</button>
      <button class="primary" id="cfm" style="min-width:100px">${t("confirm")}</button>
    </div>
  </div>`;
        document.body.appendChild(m);
        const inp = document.getElementById("codeInput");
        inp.focus();
        document.getElementById("cnl").onclick = () => m.remove();
        const doConfirm = () => {
          const code = inp.value.trim();
          if (code !== p.code) {
            toast(t("code_mismatch"), true);
            inp.select();
            return;
          }
          const s = state.settings;
          const target = Number(item.target);
          const needF = target * p.ticketsFront * (1 + s.wasteTicket / 100);
          const needB = target * p.ticketsBack * (1 + s.wasteTicket / 100);
          const needCaps = target * p.capsPer * (1 + s.wasteCap / 100);
          const needJer = target * p.jerricansPer * (1 + s.wasteJerrican / 100);
          if (action === "done") {
            p.stock.ticketsFront -= needF;
            p.stock.ticketsBack -= needB;
            p.stock.caps -= needCaps;
            p.stock.jerricans -= needJer;
            item.status = "done";
            addLog({
              type: "produce",
              product: p.code,
              target,
              date,
              by: state.role,
            });
            toast(t("success_done"));
          } else {
            p.stock.ticketsFront += needF;
            p.stock.ticketsBack += needB;
            p.stock.caps += needCaps;
            p.stock.jerricans += needJer;
            item.status = "pending";
            addLog({
              type: "undo",
              product: p.code,
              target,
              date,
              by: state.role,
            });
            toast(t("success_undo"));
          }
          saveProducts();
          savePrograms();
          m.remove();
          cb();
        };
        document.getElementById("cfm").onclick = doConfirm;
        inp.onkeydown = (e) => {
          if (e.key === "Enter") doConfirm();
        };
      }

      /* ====================== HISTORY ====================== */
      function renderHistory(main) {
        const dates = Object.keys(state.programs).sort().reverse();
        main.innerHTML = `
  <div class="card"><h3>${t("history")}</h3>
  ${
    dates.length === 0
      ? `<div class="empty">${t("no_program_today")}</div>`
      : dates
          .map((d) => {
            const progs = state.programs[d];
            let target = 0,
              done = 0;
            progs.forEach((pr) =>
              pr.items.forEach((i) => {
                target += Number(i.target);
                if (i.status === "done") done += Number(i.target);
              }),
            );
            return `<div style="margin-bottom:16px">
        <div class="flex-between" style="margin-bottom:6px">
          <strong>${d}</strong>
          <span class="badge ${done >= target ? "ok" : "warn"}">${done}/${target} ${t("bancale_equiv")}</span>
        </div>
        ${progs
          .map(
            (pr) => `
        <div style="margin-bottom:8px">
          <div class="row" style="margin-bottom:4px">${progTypeBadge(pr.progType)}<span class="smallmuted">${pr.label || ""}</span></div>
          <table><tbody>${pr.items
            .map((it) => {
              const p = getProduct(it.productId);
              const cv = getCover(it.coverId);
              const bk = getBasket(it.basketId);
              return `<tr>
              <td class="mono smallmuted">${it.time || "—"}</td>
              <td>${p ? p.name : "?"}</td>
              <td class="smallmuted">${cv ? cv.name : "—"}</td>
              <td class="smallmuted">${bk ? bk.name : "—"}</td>
              <td class="mono">${it.target}</td>
              <td class="mono smallmuted">${it.kilos ? it.kilos + "kg" : ""}</td>
              <td>${it.status === "done" ? `<span class="badge ok">✓</span>` : `<span class="badge warn">${t("pending")}</span>`}</td>
            </tr>`;
            })
            .join("")}</tbody></table>
        </div>`,
          )
          .join("")}
        <hr class="sep">
      </div>`;
          })
          .join("")
  }
  </div>
  <div class="card"><h3>${t("deduction_log")}</h3>
  ${
    state.log.length === 0
      ? `<div class="empty">${t("no_log")}</div>`
      : `<table><tbody>${state.log
          .slice()
          .reverse()
          .slice(0, 150)
          .map(
            (l) => `
      <tr><td class="smallmuted">${new Date(l.time).toLocaleString()}</td><td>${l.type}</td><td class="mono">${l.product || ""}</td><td class="smallmuted">${t("logged_by")}: ${l.by || ""}</td></tr>
    `,
          )
          .join("")}</tbody></table>`
  }
  </div>`;
      }

      /* ====================== STATS ====================== */
      function renderStats(main) {
        const month = todayStr().slice(0, 7);
        const today = todayStr();
        function aggregate(predicate) {
          const byCompany = {};
          let total = 0;
          Object.entries(state.programs).forEach(([d, progs]) => {
            if (!predicate(d)) return;
            progs.forEach((pr) =>
              pr.items.forEach((it) => {
                if (it.status !== "done") return;
                const p = getProduct(it.productId);
                if (!p) return;
                byCompany[p.company] =
                  (byCompany[p.company] || 0) + Number(it.target);
                total += Number(it.target);
              }),
            );
          });
          return { byCompany, total };
        }
        const dayAgg = aggregate((d) => d === today);
        const monthAgg = aggregate((d) => d.startsWith(month));
        function topLeast(byCompany) {
          const arr = Object.entries(byCompany).sort((a, b) => b[1] - a[1]);
          return { top: arr[0], least: arr[arr.length - 1] };
        }
        const monthTL = topLeast(monthAgg.byCompany);
        main.innerHTML = `
  <div class="grid cols-2">
    <div class="card"><h3>${t("today")}</h3>
      <div class="stat" style="margin-bottom:10px"><div class="num">${dayAgg.total}</div><div class="lbl">${t("total_produced_bancale")}</div></div>
      ${companyBars(dayAgg.byCompany)}
    </div>
    <div class="card"><h3>${t("this_month")} (${month})</h3>
      <div class="stat" style="margin-bottom:10px"><div class="num">${monthAgg.total}</div><div class="lbl">${t("total_produced_bancale")}</div></div>
      ${monthTL.top ? `<div class="smallmuted">${t("top_company")}: <strong>${monthTL.top[0]}</strong> (${monthTL.top[1]})</div>` : ""}
      ${monthTL.least && monthTL.least !== monthTL.top ? `<div class="smallmuted">${t("least_company")}: <strong>${monthTL.least[0]}</strong> (${monthTL.least[1]})</div>` : ""}
      ${companyBars(monthAgg.byCompany)}
    </div>
  </div>`;
      }
      function companyBars(byCompany) {
        const entries = Object.entries(byCompany).sort((a, b) => b[1] - a[1]);
        if (entries.length === 0)
          return `<div class="empty">${t("no_data")}</div>`;
        const max = entries[0][1];
        return `<div style="margin-top:10px">${entries
          .map(
            ([c, v]) => `
    <div style="margin-bottom:8px">
      <div class="flex-between smallmuted"><span>${c}</span><span class="mono">${v}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${(v / max) * 100}%;background:#f2b705"></div></div>
    </div>`,
          )
          .join("")}</div>`;
      }

      /* ====================== ADMIN ====================== */
      function renderAdmin(main) {
        const s = state.settings;
        main.innerHTML = `
  <!-- waste settings -->
  <div class="card"><h3>${t("settings")}</h3>
    <div class="grid cols-4">
      <div class="field"><label>${t("waste_ticket")}</label><input id="a_wt" type="number" step="0.1" value="${s.wasteTicket}"></div>
      <div class="field"><label>${t("waste_cap")}</label><input id="a_wc" type="number" step="0.1" value="${s.wasteCap}"></div>
      <div class="field"><label>${t("waste_jerrican")}</label><input id="a_wj" type="number" step="0.1" value="${s.wasteJerrican}"></div>
      <div class="field"><label>${t("low_stock_threshold")}</label><input id="a_low" type="number" value="${s.lowStock}"></div>
    </div>
    <button class="primary" id="saveSettings">${t("save")}</button>
  </div>

  <!-- covers -->
  <div class="card">
    <div class="flex-between"><h3>${t("manage_covers")}</h3><button class="primary" id="addCoverBtn">+ ${t("add_cover")}</button></div>
    ${
      state.covers.length === 0
        ? `<div class="empty">${t("no_cover")}</div>`
        : `
    <table><thead><tr><th>${t("cover_name")}</th><th>${t("cover_type")}</th><th>${t("actions")}</th></tr></thead><tbody>
    ${state.covers
      .map(
        (c) => `<tr>
      <td>${c.name}</td>
      <td><span class="badge ${c.coverType === "front" ? "blue" : "warn"}">${t(c.coverType === "front" ? "front_cover" : "back_cover")}</span></td>
      <td><button class="danger ghost" style="padding:4px 8px" data-delcover="${c.id}">✕</button></td>
    </tr>`,
      )
      .join("")}
    </tbody></table>`
    }
  </div>

  <!-- baskets -->
  <div class="card">
    <div class="flex-between"><h3>${t("manage_baskets")}</h3><button class="primary" id="addBasketBtn">+ ${t("add_basket")}</button></div>
    ${
      state.baskets.length === 0
        ? `<div class="empty">${t("no_basket")}</div>`
        : `
    <table><thead><tr><th>${t("basket_name")}</th><th>${t("actions")}</th></tr></thead><tbody>
    ${state.baskets
      .map(
        (b) => `<tr>
      <td>${b.name}</td>
      <td><button class="danger ghost" style="padding:4px 8px" data-delbask="${b.id}">✕</button></td>
    </tr>`,
      )
      .join("")}
    </tbody></table>`
    }
  </div>`;

        document.getElementById("saveSettings").onclick = () => {
          state.settings = {
            wasteTicket: Number(document.getElementById("a_wt").value) || 0,
            wasteCap: Number(document.getElementById("a_wc").value) || 0,
            wasteJerrican: Number(document.getElementById("a_wj").value) || 0,
            lowStock: Number(document.getElementById("a_low").value) || 5,
          };
          saveSettings();
          toast(t("success_added"));
          render();
        };
        document.getElementById("addCoverBtn").onclick = () => openCoverModal();
        document.getElementById("addBasketBtn").onclick = () =>
          openBasketModal();
        main.querySelectorAll("[data-delcover]").forEach(
          (b) =>
            (b.onclick = () => {
              if (!confirm(t("confirm_delete"))) return;
              state.covers = state.covers.filter(
                (c) => c.id !== b.dataset.delcover,
              );
              saveCovers();
              renderAdmin(main);
            }),
        );
        main.querySelectorAll("[data-delbask]").forEach(
          (b) =>
            (b.onclick = () => {
              if (!confirm(t("confirm_delete"))) return;
              state.baskets = state.baskets.filter(
                (bk) => bk.id !== b.dataset.delbask,
              );
              saveBaskets();
              renderAdmin(main);
            }),
        );
      }

      function openCoverModal() {
        const m = document.createElement("div");
        m.className = "modal-bg";
        m.innerHTML = `<div class="modal" style="max-width:360px">
    <h3>${t("add_cover")}</h3>
    <div class="field"><label>${t("cover_name")}</label><input id="c_name" placeholder="${t("cover_name")}..."></div>
    <div class="field"><label>${t("cover_type")}</label>
      <select id="c_type">
        <option value="front">${t("front_cover")}</option>
        <option value="back">${t("back_cover")}</option>
      </select>
    </div>
    <div class="row" style="justify-content:flex-end;margin-top:14px">
      <button id="cnl">${t("cancel")}</button>
      <button class="primary" id="cfm">${t("save")}</button>
    </div>
  </div>`;
        document.body.appendChild(m);
        document.getElementById("cnl").onclick = () => m.remove();
        document.getElementById("cfm").onclick = () => {
          const name = document.getElementById("c_name").value.trim();
          if (!name) {
            toast("—", true);
            return;
          }
          state.covers.push({
            id: "cv" + Date.now(),
            name,
            coverType: document.getElementById("c_type").value,
          });
          saveCovers();
          toast(t("success_added"));
          m.remove();
          render();
        };
      }

      function openBasketModal() {
        const m = document.createElement("div");
        m.className = "modal-bg";
        m.innerHTML = `<div class="modal" style="max-width:360px">
    <h3>${t("add_basket")}</h3>
    <div class="field"><label>${t("basket_name")}</label><input id="b_name" placeholder="${t("basket_name")}..."></div>
    <div class="row" style="justify-content:flex-end;margin-top:14px">
      <button id="cnl">${t("cancel")}</button>
      <button class="primary" id="cfm">${t("save")}</button>
    </div>
  </div>`;
        document.body.appendChild(m);
        document.getElementById("cnl").onclick = () => m.remove();
        document.getElementById("cfm").onclick = () => {
          const name = document.getElementById("b_name").value.trim();
          if (!name) {
            toast("—", true);
            return;
          }
          state.baskets.push({ id: "bk" + Date.now(), name });
          saveBaskets();
          toast(t("success_added"));
          m.remove();
          render();
        };
      }

      /* ====================== INIT ====================== */
      load();
    </script>
  </body>
</html>
